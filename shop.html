<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HaroonX | Shop</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<body>

    <header>
        <div class="logo">Haroon<span>X</span></div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html" class="active">Shop</a></li>
                <li><a href="arrivals.html">New Arrivals</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </nav>
        <div class="nav-icons">
            <a href="#"><i class="fas fa-search"></i></a>
            <a href="#"><i class="fas fa-user"></i></a>
            <div class="cart-icon">
                <a href="#"><i class="fas fa-shopping-bag"></i></a>

    <section class="products-section">
        <h2>Featured Shop</h2>
        <p>Summer Collection New Modern Designs</p>
        <div class="pro-container">
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?auto=format&fit=crop&w=500&q=80" alt="T-Shirt">
                <div class="des">
                    <span>HaroonX Basics</span>
                    <h5>Classic White Premium Tee</h5>
                    <div class="star"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i></div>
                    <h4>$29.00</h4>
                </div>
                <button class="add-to-cart-btn"><i class="fas fa-shopping-cart"></i></button>
            </div>

            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1544441893-675973e31985?auto=format&fit=crop&w=500&q=80" alt="Hoodie">
                <div class="des">
                    <span>HaroonX Street</span>
                    <h5>Oversized Heavyweight Hoodie</h5>
                    <div class="star"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="far fa-star"></i></div>
                    <h4>$59.00</h4>
                </div>
                <button class="add-to-cart-btn"><i class="fas fa-shopping-cart"></i></button>
